name: ClaudeUsage
options:
  bundleIdPrefix: com.jb
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.4"
    CURRENT_PROJECT_VERSION: "12"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "77UHX55UF6"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_HARDENED_RUNTIME: YES

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "ClaudeUsage.icon"
      - path: App/ClaudeUsage.icon
        type: file
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jb.ClaudeUsage
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/ClaudeUsage.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ClaudeUsage
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
      configs:
        # Release archives sign manually with the Developer ID cert + a Developer ID
        # profile (works in CI from secrets); Debug stays automatic for local dev.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "ClaudeUsage Developer ID CI"
    dependencies:
      - target: ClaudeUsageWidgetExtension
      - package: Sparkle
    scheme:
      buildImplicitDependencies: true
      testTargets:
        - ClaudeUsageTests

  ClaudeUsageWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - Widget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jb.ClaudeUsage.Widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/ClaudeUsageWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "ClaudeUsage Widget Developer ID CI"

  ClaudeUsageTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jb.ClaudeUsageTests
        GENERATE_INFOPLIST_FILE: YES
