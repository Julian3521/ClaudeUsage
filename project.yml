name: ClaudeUsage
options:
  bundleIdPrefix: com.jb
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "77UHX55UF6"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "ClaudeUsage.icon"
      - path: App/ClaudeUsage.icon
        type: file
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jb.ClaudeUsage
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/ClaudeUsage.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ClaudeUsage
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: ClaudeUsageWidgetExtension
    scheme:
      buildImplicitDependencies: true
      testTargets:
        - ClaudeUsageTests

  ClaudeUsageWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - Widget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jb.ClaudeUsage.Widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/ClaudeUsageWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO

  ClaudeUsageTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jb.ClaudeUsageTests
        GENERATE_INFOPLIST_FILE: YES
