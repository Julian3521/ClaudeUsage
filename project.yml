name: ClaudeUsage
options:
  bundleIdPrefix: com.julianbelting
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Set your Apple Developer Team ID here (or pick it in Xcode > Signing & Capabilities)
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  ClaudeUsage:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.julianbelting.ClaudeUsage
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/ClaudeUsage.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: ClaudeUsageWidgetExtension

  ClaudeUsageWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.julianbelting.ClaudeUsage.Widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/ClaudeUsageWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
